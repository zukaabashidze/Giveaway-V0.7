<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard 🛠️</title>
    <style>
        :root {
            --primary: #ff0000; /* ხასხასა ნეონის წითელი */
            --accent: #8b0000;  /* მუქი წითელი აქცენტებისთვის */
            --bg: #0a0000;      /* თითქმის შავი, წითელი ტონით */
            --card-bg: rgba(20, 0, 0, 0.4); /* მუქი გამჭვირვალე წითელი */
            --danger: #ff4b2b;
            --success: #00ff88;
        }
        
        body {
            background: var(--bg);
            /* რადიალური გრადიენტი უფრო ღრმა ეფექტისთვის */
            background: radial-gradient(circle at top left, #200000, #050000);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 40px;
            margin: 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            color: #ffffff;
        }
        
        h1 {
            font-size: 32px;
            /* ტექსტის გრადიენტი წითელში */
            background: linear-gradient(to right, var(--primary), #ffb3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.3));
        }
        
        /* გამარჯვებულის ბლოკი - ცეცხლოვანი ეფექტი */
        .winner-box {
            background: linear-gradient(45deg, var(--accent), var(--primary));
            color: white;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: none;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4);
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ღილაკები - Neon Red ეფექტით */
        .btn-pick {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-pick:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 0, 0, 0.6);
            filter: brightness(1.2);
        }
        
        /* ცხრილი */
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 0, 0.15);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        
        th {
            background: rgba(255, 0, 0, 0.08);
            padding: 18px;
            color: var(--primary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 0, 0, 0.05);
            font-size: 15px;
            color: #ddd;
        }
        
        tr:hover td {
            background: rgba(255, 0, 0, 0.03);
            color: white;
        }
        
        /* IP ტეგი - წითელი განათებით */
        .ip-tag {
            background: rgba(255, 0, 0, 0.1);
            color: #ff6666;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }
        
        .btn-delete {
            color: #ffb3b3;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            padding: 6px 14px;
            border: 1px solid var(--danger);
            border-radius: 8px;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn-delete:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 15px rgba(255, 75, 43, 0.4);
        }
        
        .stats {
            margin-bottom: 20px;
            font-size: 14px;
            color: #996666;
            font-style: italic;
        }
        
        .ip-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* დამალული IP */
        .hidden-ip {
            filter: blur(6px);
            user-select: none;
            opacity: 0.5;
        }
        
        .toggle-ip {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: var(--primary);
            cursor: pointer;
            border-radius: 5px;
            padding: 3px 10px;
            font-size: 12px;
            transition: 0.3s;
        }
        
        .toggle-ip:hover {
            background: var(--primary);
            color: black;
        }
    </style>
</head>
<body>
    <div class="rain" id="rainContainer"></div>
    <div class="container">
        <h1 style="color: white;">ადმინ პანელი 🛠️</h1>
        
        <div id="win" class="winner-box"></div>
        
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <button class="btn-pick" onclick="pick()">გამარჯვებულის გამოვლენა 🎲</button>
            <div class="stats">სულ მონაწილე: <b>{{ participants|length }}</b></div>
        </div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>სახელი გვარი</th>
                <th>Discord / Steam</th>
                <th>IP მისამართი</th>
                <th>მოქმედება</th>
            </tr>
        </thead>
        <tbody>
            {% for p in participants %}
            <tr>
                <!-- სახელი და გვარი -->
                <td style="color: white; font-weight: 500;">
                    {{ p.full_name }}
                </td>

                <!-- Discord და Steam -->
                <td>
                    <span style="color: #7289da;">{{ p.discord_tag }}</span><br>
                    <span style="font-size: 12px; opacity: 0.7;">{{ p.steam_name }}</span>
                </td>

                <!-- IP მისამართი -->
                <td>
                    <div class="ip-container">
                        <span class="ip-tag hidden-ip" id="ip-{{ loop.index }}">{{ p.ip_address }}</span>
                        <button type="button" class="toggle-ip" onclick="toggleIP('ip-{{ loop.index }}', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </td>

                <!-- მოქმედება (წაშლის ღილაკი) -->
                <td>
                    <a href="/delete/{{ p.id }}/{{ pw }}" 
                       class="btn-delete" 
                       onclick="return confirm('ნამდვილად გსურთ წაშლა?')">
                       წაშლა
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

    <script>
        async function pick() {
            const btn = document.querySelector('.btn-pick');
            btn.innerText = "მიმდინარეობს შერჩევა...";
            
            try {
                const res = await fetch('/pick_winner/{{ pw }}');
                const data = await res.json();
                
                if(data.full_name) {
                    const w = document.getElementById('win');
                    w.style.display = 'block';
                    w.innerHTML = `🏆 გამარჯვებული: <span style="color: #fff; text-decoration: underline;">${data.full_name}</span> 
                                  <br><span style="font-size: 16px; opacity: 0.9;">Discord: ${data.discord} | Steam: ${data.steam}</span>`;
                    
                    // ეკრანზე ასქროლვა გამარჯვებულთან
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    alert("მონაწილეები არ არიან!");
                }
            } catch (e) {
                alert("შეცდომა გამარჯვებულის გამოვლენისას.");
            } finally {
                btn.innerText = "გამარჯვებულის გამოვლენა 🎲";
            }
        }


        function toggleIP(id, button) {
        const ipSpan = document.getElementById(id);
        const icon = button.querySelector('i');
        
        if (ipSpan.classList.contains('hidden-ip')) {
            ipSpan.classList.remove('hidden-ip');
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            ipSpan.classList.add('hidden-ip');
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    </script>
</body>
</html>

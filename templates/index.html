<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Giveaway 🎁</title>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        :root {
            --primary: #ff0000; /* ხასხასა წითელი */
            --secondary: #8b0000; /* მუქი წითელი */
            --bg: #050000;
            --card-bg: rgba(20, 0, 0, 0.75); /* ოდნავ უფრო მუქი, რომ ტექსტი უკეთ გამოჩნდეს ბანერზე */
            --error: #ff4b2b;
            --text-color: #ffffff;
        }

       body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh; /* აიძულებს ბადის, რომ მინიმუმ ეკრანის სიმაღლე დაიკავოს */
        display: flex;
        justify-content: center;
        align-items: center;

        /* ფონის პარამეტრები */
        background-image: url("{{ url_for('static', filename='231561.png') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-size:  cover;       /* ფოტო გაიწელება ისე, რომ მთლიანი სივრცე შეავსოს */
        background-position: center;  /* ფოტო ყოველთვის ცენტრიდან იქნება ორიენტირებული */
        background-repeat: repeat; /* რომ არ გაორდეს და არ აიჭრას */
        background-attachment: fixed; /* ეკრანზე "მიაჭედებს" ფოტოს, რაც ძაან ეფექტურია */

        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow-x: hidden; /* გვერდითა სქროლი რომ არ გაჩნდეს შემთხვევით */
    }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); /* 40%-ით დააბნელებს სურათს, რომ card უკეთ გამოჩნდეს */
            z-index: 1;
        }

        /* რომ card-ი ფენის ზემოთ დარჩეს */
        .card {
            position: relative;
            z-index: 2;
        }

        /* წვიმის კონტეინერი */
        .rain {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; /* ბარათის უკან, მაგრამ ფონის წინ */
            pointer-events: none;
        }

        .drop {
            position: absolute;
            background: rgba(255, 0, 0, 0.6); /* წითელი წვიმა */
            width: 2px;
            height: 80px;
            top: -100px;
            animation: fall 0.5s linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(120vh); }
        }

        /* რეგისტრაციის ბარათი */
        .card {
            position: relative;
            z-index: 10;
            /* შეცვალე '0.1' უფრო დაბალი ციფრით მეტი გამჭვირვალობისთვის */
            background: rgba(255, 255, 255, 0); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 0, 0.4);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        h2 {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 25px;
            opacity: 0.8;
            color: white;
        }

        .input-group {
            width: 100%;
        }

        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #400;
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: calc(100% - 26px); /* padding-ის გათვალისწინებით */
            margin-bottom: 15px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        button {
            background: linear-gradient(45deg, #800, #f00);
            border: none;
            padding: 15px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            box-shadow: 0 0 20px #f00;
            transform: scale(1.02);
        }

        #msg {
            margin-top: 15px;
            font-size: 14px;
            min-height: 1em;
        }
        
        .error { color: var(--error); }
        .success { color: #0f0; }

        /* დაბლოკილი მომხმარებლის სტილი */
        .blocked-container {
            position: relative;
            z-index: 100;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--error);
        }
    </style>
</head>
<body>
        
    <div class="rain" id="rainContainer"></div>
    
    <div class="card" id="main-card">
        <h2>გათამაშება 🎁</h2>
        <p class="subtitle" style="color:white;" >შეავსეთ მონაცემები მონაწილეობისთვის</p>
        
        <div class="input-group">
            <input type="text" id="name" placeholder="სახელი გვარი" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="text" id="discord" placeholder="Discord Nick/link " autocomplete="off">
        </div>
        <div class="input-group">
            <input type="text" id="steam" placeholder="Steam Nick/link" autocomplete="off">
        </div>
        
        <button id="reg-btn" onclick="send()">რეგისტრაცია</button>
        <p id="msg"></p>
    </div>

    <script>
        // წვიმის ეფექტის შექმნა
        function createRain() {
            const container = document.getElementById('rainContainer');
            const dropCount = 100; // წვეთების რაოდენობა

            for (let i = 0; i < dropCount; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                // სხვადასხვა სიჩქარე და დაყოვნება
                drop.style.animationDuration = (Math.random() * 0.4 + 0.3) + 's'; 
                drop.style.animationDelay = (Math.random() * 2) + 's';
                drop.style.opacity = Math.random() * 0.5 + 0.2; // სხვადასხვა გამჭვირვალობა
                container.appendChild(drop);
            }
        }

        // გაშვება ჩატვირთვისას
        createRain();

        // VPN და Timezone შემოწმება
        async function checkVPN() {
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            // 1. Timezone შემოწმება
            const allowedTimezones = ["Asia/Tbilisi", "Europe/Athens"];
            
            if (!allowedTimezones.includes(tz)) {
                blockUser("თქვენი დროის სარტყელი არასწორია. გთხოვთ გამორთოთ VPN.");
                return;
            }

            try {
                // 2. IP შემოწმება
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const allowedCountries = ["GE"];
                
                    if (!allowedCountries.includes(data.country)) {
                        blockUser(".");
                    }
            } catch (e) {
                console.warn("IP Check bypassed due to connection error.");
            }
        }

        function blockUser(message) {
            document.body.innerHTML = `
                <div class="rain" id="rainContainer"></div>
                <div class="blocked-container">
                    <h1 style="color:var(--error); margin-bottom:10px;">წვდომა უარყოფილია! 🛑 <br>   
                    რეგისტრაცია შესაძლებელია მხოლოდ საქართველოდან</h1>
                    <p style="margin-bottom:20px;">${message}</p>
                    <button style="width:auto; padding: 12px 30px;" onclick="location.reload()">განახლება</button>
                </div>`;
            createRain(); // წვიმა დაბლოკვისასაც რომ დარჩეს
        }

        // VPN შემოწმების გაშვება
        checkVPN();

        // რეგისტრაციის ფუნქცია
        async function send() {
            const name = document.getElementById('name').value.trim();
            const discord = document.getElementById('discord').value.trim();
            const steam = document.getElementById('steam').value.trim();
            const msgObj = document.getElementById('msg');
            const btn = document.getElementById('reg-btn');

            // ვალიდაცია
            if (!name || !discord || !steam) {
                msgObj.innerText = "გთხოვთ შეავსოთ ყველა ველი!";
                msgObj.className = "error";
                return;
            }

            btn.disabled = true;
            btn.innerText = "მუშავდება...";
            msgObj.innerText = "";

            try {
                const fpLoad = await FingerprintJS.load();
                const fp = await fpLoad.get();
                
                // POST მოთხოვნა /register ენდპოინტზე
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        full_name: name,
                        discord_tag: discord,
                        steam_name: steam,
                        fingerprint: fp.visitorId
                    })
                });
                
                const data = await res.json();
                msgObj.innerText = data.message;
                
                if(data.status === "success") {
                    msgObj.className = "success";
                    btn.innerText = "მზადაა!";
                    // ფორმის დაბლოკვა წარმატებისას
                    document.querySelectorAll('input').forEach(i => i.disabled = true);
                } else {
                    msgObj.className = "error";
                    btn.disabled = false;
                    btn.innerText = "რეგისტრაცია";
                }
            } catch (err) {
                msgObj.innerText = "კავშირის შეცდომა. გამორთეთ extension და სცადეთ მოგვიანებით.";
                msgObj.className = "error";
                btn.disabled = false;
                btn.innerText = "რეგისტრაცია";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard 🛠️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0000; 
            --accent: #8b0000;  
            --bg: #0a0000;      
            --card-bg: rgba(20, 0, 0, 0.4);
            --danger: #ff4b2b;
        }
        
        body {
            background: radial-gradient(circle at top left, #200000, #050000);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 40px;
            margin: 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1150px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 32px;
            background: linear-gradient(to right, var(--primary), #ffb3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .search-wrapper {
            margin-bottom: 25px;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            padding-left: 45px;
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 0, 0.2);
            background: rgba(30, 0, 0, 0.5);
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            opacity: 0.7;
        }
        
        .winner-box {
            background: linear-gradient(45deg, var(--accent), var(--primary));
            color: white;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: none;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4);
        }
        
        .btn-pick {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 0, 0.15);
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: rgba(255, 0, 0, 0.08);
            padding: 18px;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 13px;
        }
        
        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 0, 0, 0.05);
            color: #ddd;
        }

        .device-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.07);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .ip-tag {
            background: rgba(255, 0, 0, 0.1);
            color: #ff6666;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
        }

        .btn-delete {
            color: #ffb3b3;
            text-decoration: none;
            border: 1px solid var(--danger);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        .hidden-ip { filter: blur(6px); opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ადმინ პანელი 🛠️</h1>
        
        <div id="win" class="winner-box"></div>

        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="მოძებნე მონაწილე...">
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button class="btn-pick" onclick="pick()">გამარჯვებულის გამოვლენა 🎲</button>
            <div style="color: #966; font-style: italic;">სულ: {{ participants|length }}</div>
        </div>

        <div class="table-container">
            <table id="participantsTable">
                <thead>
                    <tr>
                        <th>სახელი გვარი</th>
                        <th>Discord / Steam</th>
                        <th>IP მისამართი</th>
                        <th>მოწყობილობა</th>
                        <th>მოქმედება</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in participants %}
                    <tr>
                        <td style="color: white;">{{ p.full_name }}</td>
                        <td>
                            <span style="color: #7289da;">{{ p.discord_tag }}</span><br>
                            <small style="opacity: 0.6;">{{ p.steam_name }}</small>
                        </td>
                        <td>
                            <span class="ip-tag hidden-ip" id="ip-{{ loop.index }}">{{ p.ip_address }}</span>
                            <button onclick="toggleIP('ip-{{ loop.index }}', this)" style="background:none; border:none; color:red; cursor:pointer;">
                                <i class="fas fa-eye"></i>
                            </button>
                        </td>
                        <td>
                            <div class="device-badge">
                                <i class="device-icon" data-ua="{{ p.device_info }}"></i>
                                <span class="device-text" data-ua="{{ p.device_info }}">...</span>
                            </div>
                        </td>
                        <td>
                            <a href="/delete/{{ p.id }}/{{ pw }}" class="btn-delete" onclick="return confirm('წავშალოთ?')">წაშლა</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // მხოლოდ ტელეფონი ან კომპიუტერი
        function identifyDevice(ua) {
            if (!ua) return { name: "უცნობია", icon: "fa-question" };
            const lower = ua.toLowerCase();
            
            // მობილურის ძირითადი მარკერები
            const isMobile = /android|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(lower);
            
            if (isMobile) {
                return { name: "ტელეფონი", icon: "fa-mobile-alt" };
            } else {
                return { name: "კომპიუტერი", icon: "fa-desktop" };
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('.device-text').forEach((el, i) => {
                const info = identifyDevice(el.getAttribute('data-ua'));
                el.innerText = info.name;
                document.querySelectorAll('.device-icon')[i].className = "fas " + info.icon;
            });
        });

        function searchTable() {
            const filter = document.getElementById("searchInput").value.toLowerCase();
            const rows = document.querySelectorAll("#participantsTable tbody tr");
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
            });
        }

        async function pick() {
            const btn = document.querySelector('.btn-pick');
            btn.innerText = "ირჩევა...";
            try {
                const res = await fetch('/pick_winner/{{ pw }}');
                const data = await res.json();
                if(data.full_name) {
                    const winBox = document.getElementById('win');
                    winBox.style.display = 'block';
                    winBox.innerHTML = `🏆 გამარჯვებული: ${data.full_name}<br><small>Discord: ${data.discord}</small>`;
                }
            } catch (e) { alert("შეცდომა!"); }
            btn.innerText = "გამარჯვებულის გამოვლენა 🎲";
        }

        function toggleIP(id, btn) {
            const el = document.getElementById(id);
            const icon = btn.querySelector('i');
            el.classList.toggle('hidden-ip');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }
    </script>
</body>
</html>
